name: Static Build

on:
  push:
    branches: [ master ]
    tags: [ '*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcrypt-dev

      - name: Build static binary
        run: |
          make clean || true
          make static

      - name: Verify binary
        run: |
          file su
          size su
          if ldd su 2>&1 | grep -q "not a dynamic executable\|statically linked"; then
            echo "Confirmed static binary"
          else
            echo "Binary is dynamically linked"
            exit 1
          fi


      - name: Rename binary
        run: cp su su-static-linux-x86_64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: su-static-linux-x86_64
          path: su-static-linux-x86_64

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: su-static-linux-x86_64
          generate_release_notes: true
